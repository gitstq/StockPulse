<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPulse - 股票行情追踪平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stock-up { color: #10b981; }
        .stock-down { color: #ef4444; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="text-white">
    <div class="container mx-auto px-4 py-6">
        <!-- Header -->
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-chart-line text-3xl text-blue-400"></i>
                    <div>
                        <h1 class="text-3xl font-bold">StockPulse</h1>
                        <p class="text-gray-400 text-sm">本地化股票行情追踪与分析平台</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-400" id="current-time"></p>
                </div>
            </div>
        </header>

        <!-- Market Overview -->
        <section class="mb-8">
            <h2 class="text-xl font-semibold mb-4"><i class="fas fa-globe mr-2"></i>全球市场概览</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="market-overview">
                <div class="glass-panel rounded-lg p-4 text-center">
                    <p class="text-gray-400 text-sm">加载中...</p>
                </div>
            </div>
        </section>

        <!-- Search -->
        <section class="mb-8">
            <div class="glass-panel rounded-lg p-4">
                <div class="flex space-x-4">
                    <input type="text" id="search-input" placeholder="输入股票代码或名称..." 
                           class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500">
                    <button onclick="searchStock()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg transition">
                        <i class="fas fa-search mr-2"></i>搜索
                    </button>
                </div>
                <div id="search-results" class="mt-4 hidden"></div>
            </div>
        </section>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Watchlist -->
            <div class="lg:col-span-1">
                <div class="glass-panel rounded-lg p-4">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-star mr-2 text-yellow-400"></i>自选股</h2>
                    <div id="watchlist" class="space-y-2">
                        <p class="text-gray-400 text-center py-4">加载中...</p>
                    </div>
                </div>
            </div>

            <!-- Stock Detail -->
            <div class="lg:col-span-2">
                <div class="glass-panel rounded-lg p-4">
                    <h2 class="text-xl font-semibold mb-4"><i class="fas fa-chart-area mr-2"></i>股票详情</h2>
                    <div id="stock-detail">
                        <p class="text-gray-400 text-center py-8">点击自选股或搜索股票查看详情</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSymbol = null;
        let chartInstance = null;

        // Update time
        function updateTime() {
            document.getElementById('current-time').textContent = new Date().toLocaleString('zh-CN');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Load market overview
        async function loadMarketOverview() {
            try {
                const response = await fetch('/api/market');
                const data = await response.json();
                
                const container = document.getElementById('market-overview');
                container.innerHTML = data.map(item => {
                    const isUp = item.change >= 0;
                    const colorClass = isUp ? 'stock-up' : 'stock-down';
                    const icon = isUp ? '▲' : '▼';
                    
                    return `
                        <div class="glass-panel rounded-lg p-4">
                            <p class="text-gray-400 text-sm">${item.index_name}</p>
                            <p class="text-2xl font-bold">${item.price.toFixed(2)}</p>
                            <p class="${colorClass} text-sm">
                                ${icon} ${Math.abs(item.change).toFixed(2)} (${Math.abs(item.change_percent).toFixed(2)}%)
                            </p>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('加载市场数据失败:', error);
            }
        }

        // Load watchlist
        async function loadWatchlist() {
            try {
                const response = await fetch('/api/watchlist');
                const data = await response.json();
                
                const container = document.getElementById('watchlist');
                if (data.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-4">自选股列表为空</p>';
                    return;
                }
                
                container.innerHTML = data.map(item => {
                    const quote = item.quote;
                    if (!quote) {
                        return `
                            <div class="bg-gray-700 rounded-lg p-3 cursor-pointer hover:bg-gray-600 transition" onclick="showStockDetail('${item.symbol}')">
                                <div class="flex justify-between items-center">
                                    <span class="font-semibold">${item.symbol}</span>
                                    <span class="text-gray-400">-</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    const isUp = quote.is_positive;
                    const colorClass = isUp ? 'stock-up' : 'stock-down';
                    
                    return `
                        <div class="bg-gray-700 rounded-lg p-3 cursor-pointer hover:bg-gray-600 transition" onclick="showStockDetail('${item.symbol}')">
                            <div class="flex justify-between items-center">
                                <div>
                                    <span class="font-semibold">${item.symbol}</span>
                                    <span class="text-gray-400 text-sm ml-2">${quote.name || ''}</span>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold">${quote.price.toFixed(2)}</p>
                                    <p class="${colorClass} text-sm">${quote.change >= 0 ? '+' : ''}${quote.change_percent.toFixed(2)}%</p>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('加载自选股失败:', error);
            }
        }

        // Search stock
        async function searchStock() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                const resultsDiv = document.getElementById('search-results');
                if (data.length === 0) {
                    resultsDiv.innerHTML = '<p class="text-gray-400">未找到相关股票</p>';
                } else {
                    resultsDiv.innerHTML = `
                        <div class="bg-gray-700 rounded-lg p-4">
                            <h3 class="font-semibold mb-2">搜索结果</h3>
                            <div class="space-y-2">
                                ${data.map(item => `
                                    <div class="flex justify-between items-center p-2 hover:bg-gray-600 rounded cursor-pointer" onclick="showStockDetail('${item.symbol}')">
                                        <div>
                                            <span class="font-semibold">${item.symbol}</span>
                                            <span class="text-gray-400 ml-2">${item.name || ''}</span>
                                        </div>
                                        <button onclick="event.stopPropagation(); addToWatchlist('${item.symbol}', '${item.name || ''}')" class="text-blue-400 hover:text-blue-300">
                                            <i class="fas fa-plus"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                resultsDiv.classList.remove('hidden');
            } catch (error) {
                console.error('搜索失败:', error);
            }
        }

        // Add to watchlist
        async function addToWatchlist(symbol, name) {
            try {
                const response = await fetch('/api/watchlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol, name })
                });
                const data = await response.json();
                if (data.success) {
                    loadWatchlist();
                    alert('已添加到自选股');
                } else {
                    alert('添加失败，股票可能已在列表中');
                }
            } catch (error) {
                console.error('添加自选股失败:', error);
            }
        }

        // Show stock detail
        async function showStockDetail(symbol) {
            currentSymbol = symbol;
            
            try {
                // Get quote
                const quoteResponse = await fetch(`/api/quote/${symbol}`);
                const quote = await quoteResponse.json();
                
                // Get historical data
                const histResponse = await fetch(`/api/historical/${symbol}?period=1mo`);
                const historical = await histResponse.json();
                
                // Get insight
                const insightResponse = await fetch(`/api/insight/${symbol}`);
                const insight = await insightResponse.json();
                
                const isUp = quote.is_positive;
                const colorClass = isUp ? 'stock-up' : 'stock-down';
                
                document.getElementById('stock-detail').innerHTML = `
                    <div class="space-y-6">
                        <!-- Basic Info -->
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-2xl font-bold">${quote.name || symbol} <span class="text-gray-400">(${symbol})</span></h3>
                                <p class="text-sm text-gray-400">${quote.currency}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-3xl font-bold ${colorClass}">${quote.price.toFixed(2)}</p>
                                <p class="${colorClass}">${quote.change >= 0 ? '+' : ''}${quote.change.toFixed(2)} (${quote.change_percent >= 0 ? '+' : ''}${quote.change_percent.toFixed(2)}%)</p>
                            </div>
                        </div>
                        
                        <!-- Price Details -->
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-gray-700 rounded-lg p-3">
                                <p class="text-gray-400 text-sm">开盘价</p>
                                <p class="font-semibold">${quote.open.toFixed(2)}</p>
                            </div>
                            <div class="bg-gray-700 rounded-lg p-3">
                                <p class="text-gray-400 text-sm">最高价</p>
                                <p class="font-semibold">${quote.high.toFixed(2)}</p>
                            </div>
                            <div class="bg-gray-700 rounded-lg p-3">
                                <p class="text-gray-400 text-sm">最低价</p>
                                <p class="font-semibold">${quote.low.toFixed(2)}</p>
                            </div>
                            <div class="bg-gray-700 rounded-lg p-3">
                                <p class="text-gray-400 text-sm">成交量</p>
                                <p class="font-semibold">${quote.volume.toLocaleString()}</p>
                            </div>
                        </div>
                        
                        <!-- Chart -->
                        <div>
                            <canvas id="stock-chart" height="100"></canvas>
                        </div>
                        
                        <!-- Insight -->
                        ${insight.overall_rating ? `
                        <div class="bg-gray-700 rounded-lg p-4">
                            <h4 class="font-semibold mb-3"><i class="fas fa-lightbulb mr-2 text-yellow-400"></i>智能分析</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="text-center">
                                    <p class="text-gray-400 text-sm">技术面</p>
                                    <p class="text-xl font-bold">${insight.technical_score}/100</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-gray-400 text-sm">基本面</p>
                                    <p class="text-xl font-bold">${insight.fundamental_score}/100</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-gray-400 text-sm">情绪面</p>
                                    <p class="text-xl font-bold">${insight.sentiment_score}/100</p>
                                </div>
                            </div>
                            <div class="mt-4 p-3 bg-gray-600 rounded">
                                <p><strong>综合评级:</strong> ${insight.overall_rating}</p>
                                <p><strong>操作建议:</strong> ${insight.recommendation}</p>
                                ${insight.support_level ? `<p><strong>支撑位:</strong> ${insight.support_level}</p>` : ''}
                                ${insight.resistance_level ? `<p><strong>阻力位:</strong> ${insight.resistance_level}</p>` : ''}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
                
                // Render chart
                if (historical.length > 0) {
                    renderChart(historical);
                }
                
            } catch (error) {
                console.error('加载股票详情失败:', error);
                document.getElementById('stock-detail').innerHTML = '<p class="text-red-400 text-center">加载失败</p>';
            }
        }

        // Render chart
        function renderChart(historical) {
            const ctx = document.getElementById('stock-chart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            const labels = historical.map(d => new Date(d.date).toLocaleDateString('zh-CN'));
            const prices = historical.map(d => d.close);
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '收盘价',
                        data: prices,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.1,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: 'white' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'rgba(255,255,255,0.7)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            ticks: { color: 'rgba(255,255,255,0.7)' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        // Initial load
        loadMarketOverview();
        loadWatchlist();
        
        // Auto refresh
        setInterval(loadMarketOverview, 30000);
        setInterval(() => {
            if (currentSymbol) {
                showStockDetail(currentSymbol);
            }
            loadWatchlist();
        }, 30000);
    </script>
</body>
</html>
